services:
  lost-website:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lost-website
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - lost_site_uploads:/app/private
      - playwright_data:/ms-playwright
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {if (r.statusCode !== 200) process.exit(1)})"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 5

  lost-bot:
    build:
      context: ./Discord Bot
      dockerfile: Dockerfile
    container_name: lost-bot
    restart: unless-stopped
    depends_on:
      lost-website:
        condition: service_healthy
    env_file:
      - .env
      - ./Discord Bot/.env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - BOT_DATABASE_URL=${DATABASE_URL}
      - BOT_DB_SCHEMA=${BOT_DB_SCHEMA:-discord_bot}
      - LOST_SITE_INTERNAL_BASE_URL=http://lost-website:3000
      - LOST_SITE_PUBLIC_BASE_URL=${NEXTAUTH_URL:-https://thelostlabel.com}
      - DISCORD_COMMAND_PROFILE=${DISCORD_COMMAND_PROFILE:-artist_core}
    volumes:
      - bot_data:/app/data

volumes:
  bot_data:
  lost_site_uploads:
  playwright_data:
    # Keep the cache volume name stable across Dokploy/Swarm redeploys.
    name: ${PLAYWRIGHT_VOLUME_NAME:-lost-website-playwright-data}
