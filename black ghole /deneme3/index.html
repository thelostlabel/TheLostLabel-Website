<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Deneme 03</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Oswald:wght@700&display=swap");

      :root {
        color-scheme: dark;
        --bg-0: #030609;
        --bg-1: #08111b;
        --ink: #f7f3ed;
        --muted: rgba(247, 243, 237, 0.62);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        overflow: hidden;
        background:
          radial-gradient(circle at 50% 42%, rgba(255, 255, 255, 0.05), transparent 18%),
          radial-gradient(circle at 50% 50%, rgba(19, 31, 48, 0.92), transparent 28%),
          linear-gradient(180deg, #05090e 0%, #030507 100%);
        color: var(--ink);
        font-family: "Oswald", Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
      }

      body::after {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        opacity: 0.18;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.06) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
        background-size: 3px 3px, 3px 3px;
        mix-blend-mode: soft-light;
      }

      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }

      .hud {
        position: fixed;
        inset: 0;
        pointer-events: none;
      }

      .label {
        position: absolute;
        left: clamp(18px, 3vw, 36px);
        top: clamp(18px, 3vw, 32px);
        display: grid;
        gap: 6px;
        text-transform: uppercase;
        letter-spacing: 0.26em;
      }

      .label strong {
        font-size: clamp(0.78rem, 1vw, 0.92rem);
        line-height: 1;
      }

      .label span,
      .note {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: clamp(0.68rem, 0.8vw, 0.8rem);
        color: var(--muted);
        letter-spacing: 0.22em;
      }

      .note {
        position: absolute;
        right: clamp(18px, 3vw, 36px);
        bottom: clamp(18px, 3vw, 30px);
        text-transform: uppercase;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
    </style>
  </head>
  <body>
    <h1 class="sr-only">Deneme 03 karadelik tipografi sahnesi</h1>
    <canvas id="scene" aria-hidden="true"></canvas>

    <div class="hud" aria-hidden="true">
      <div class="label">
        <strong>Deneme 03</strong>
        <span>Gravitational Type Study</span>
      </div>
      <div class="note">Move Pointer</div>
    </div>

    <script>
      const canvas = document.getElementById("scene");
      const ctx = canvas.getContext("2d");

      const state = {
        width: 0,
        height: 0,
        dpr: 1,
        stars: [],
        textures: new Map(),
        projectedLayers: [],
        mouse: { x: 0, y: 0 },
        target: { x: 0, y: 0 },
      };

      const phrase = " THE LOST LABEL ";

      function createStars(count) {
        const stars = [];

        for (let i = 0; i < count; i += 1) {
          stars.push({
            x: Math.random(),
            y: Math.random(),
            size: 0.45 + Math.random() * 1.9,
            alpha: 0.16 + Math.random() * 0.84,
            drift: 0.4 + Math.random() * 1.2,
            pulse: Math.random() * Math.PI * 2,
          });
        }

        return stars;
      }

      function resize() {
        state.width = window.innerWidth;
        state.height = window.innerHeight;
        state.dpr = Math.min(window.devicePixelRatio || 1, 2);

        canvas.width = Math.round(state.width * state.dpr);
        canvas.height = Math.round(state.height * state.dpr);

        state.stars = createStars(Math.max(140, Math.floor((state.width * state.height) / 9000)));
        state.textures.clear();
        state.projectedLayers = [];
      }

      function drawBackground(time) {
        const { width, height, mouse } = state;
        const midX = width * 0.5;
        const midY = height * 0.5;

        const bg = ctx.createLinearGradient(0, 0, 0, height);
        bg.addColorStop(0, "#05090e");
        bg.addColorStop(1, "#020406");
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, width, height);

        const nebula = ctx.createRadialGradient(
          midX + mouse.x * 140,
          midY - height * 0.12 + mouse.y * 80,
          0,
          midX,
          midY,
          Math.max(width, height) * 0.72
        );
        nebula.addColorStop(0, "rgba(40, 62, 93, 0.24)");
        nebula.addColorStop(0.45, "rgba(15, 24, 36, 0.12)");
        nebula.addColorStop(1, "rgba(0, 0, 0, 0)");
        ctx.fillStyle = nebula;
        ctx.fillRect(0, 0, width, height);

        for (const star of state.stars) {
          const twinkle = 0.55 + 0.45 * Math.sin(time * star.drift + star.pulse);
          ctx.globalAlpha = star.alpha * twinkle;
          ctx.fillStyle = "#ffffff";
          ctx.beginPath();
          ctx.arc(
            star.x * width + mouse.x * star.size * 8,
            star.y * height + mouse.y * star.size * 8,
            star.size,
            0,
            Math.PI * 2
          );
          ctx.fill();
        }

        ctx.globalAlpha = 1;
      }

      function getStripTexture(options) {
        const {
          thickness,
          radius,
          fontSize,
          condensed,
          stretch,
          blur,
          fill,
          repeats,
        } = options;
        const circumference = Math.PI * 2 * radius;
        const key = [
          Math.round(circumference),
          Math.round(fontSize),
          Math.round(thickness),
          condensed.toFixed(2),
          stretch.toFixed(2),
          blur,
          fill,
          repeats,
        ].join(":");

        if (state.textures.has(key)) {
          return state.textures.get(key);
        }

        const strip = document.createElement("canvas");
        const stripCtx = strip.getContext("2d");
        const probe = document.createElement("canvas").getContext("2d");
        probe.font = `700 ${fontSize}px "Oswald", Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif`;

        const phraseWidth = probe.measureText(phrase).width * condensed + fontSize * 0.18;
        const stripWidth = Math.max(2200, Math.ceil(phraseWidth * repeats));
        const stripHeight = Math.max(280, Math.ceil(thickness * 1.25));

        strip.width = stripWidth;
        strip.height = stripHeight;

        stripCtx.clearRect(0, 0, stripWidth, stripHeight);
        stripCtx.font = `700 ${fontSize}px "Oswald", Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif`;
        stripCtx.textBaseline = "alphabetic";

        const baseline = stripHeight * 0.92;
        const gradient = stripCtx.createLinearGradient(0, 0, 0, stripHeight);
        gradient.addColorStop(0, "rgba(255,255,255,1)");
        gradient.addColorStop(0.55, fill);
        gradient.addColorStop(0.88, "rgba(230,230,230,0.92)");
        gradient.addColorStop(1, "rgba(255,255,255,0.24)");

        stripCtx.fillStyle = gradient;
        stripCtx.shadowColor = fill;
        stripCtx.shadowBlur = blur;

        let x = 0;

        while (x < stripWidth + phraseWidth) {
          stripCtx.save();
          stripCtx.translate(x, baseline);
          stripCtx.scale(condensed, stretch);
          stripCtx.fillText(phrase, 0, 0);
          stripCtx.restore();
          x += phraseWidth;
        }

        state.textures.set(key, strip);
        return strip;
      }

      function drawWarpedRing(options) {
        const {
          time,
          centerX,
          centerY,
          outerRadius,
          thickness,
          fontSize,
          rotation,
          alpha,
          blur,
          fill,
          wave,
          sliceWidth,
          condensed,
          stretch,
          repeats,
        } = options;
        const radius = outerRadius - thickness * 0.46;
        const strip = getStripTexture({
          thickness,
          radius,
          fontSize,
          condensed,
          stretch,
          blur,
          fill,
          repeats,
        });
        const stepAngle = (sliceWidth / strip.width) * Math.PI * 2;

        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.translate(centerX, centerY);
        ctx.rotate(rotation);

        for (let x = 0; x < strip.width; x += sliceWidth) {
          const progress = x / strip.width;
          const angle = progress * Math.PI * 2 - Math.PI * 0.5;
          const bend = Math.sin(angle * 3 - time * 0.55) * wave;
          const wobble = Math.cos(angle * 5 + time * 0.35) * wave * 0.28;
          const mousePull = state.mouse.x * Math.cos(angle) * 20 + state.mouse.y * Math.sin(angle) * 15;
          const localOuter = outerRadius + bend + wobble + mousePull;
          const localThickness = thickness * (1 + Math.sin(angle * 2 + time * 0.25) * 0.035);
          const arcWidth = Math.max(2, stepAngle * (localOuter - localThickness * 0.42) * 1.02);

          ctx.save();
          ctx.rotate(angle);
          ctx.drawImage(
            strip,
            x,
            0,
            sliceWidth,
            strip.height,
            -arcWidth * 0.5,
            -localOuter,
            arcWidth,
            localThickness
          );
          ctx.restore();
        }

        ctx.restore();
      }

      function buildProjectedTunnelLayers(options) {
        const {
          outerRadius,
          innerRadius,
          outerFontSize,
          condensed,
          depthLayers,
        } = options;
        const bandThickness = outerRadius - innerRadius;
        const strip = getStripTexture({
          thickness: bandThickness,
          radius: outerRadius,
          fontSize: outerFontSize,
          condensed,
          stretch: 1.72,
          blur: 0,
          fill: "#fcfaf6",
          repeats: 3,
        });
        const rowHeight = 4;
        const sliceWidth = 12;
        const totalRows = Math.floor(strip.height / rowHeight);
        const size = Math.ceil(outerRadius * 2.8);
        const center = size * 0.5;
        const layers = [];

        for (let layer = 0; layer < depthLayers; layer += 1) {
          const layerDepth = layer / Math.max(1, depthLayers - 1);
          const layerEase = layerDepth * layerDepth;
          const layerCanvas = document.createElement("canvas");
          const layerCtx = layerCanvas.getContext("2d");
          layerCanvas.width = size;
          layerCanvas.height = size;
          const alpha = 1 - layerEase * 0.82;
          const shadow = layer === 0 ? 0 : Math.round(2 + layerEase * 6);
          const offsetX = (layer * 140) % strip.width;

          layerCtx.save();
          layerCtx.translate(center, center);
          layerCtx.shadowColor = "#ffffff";
          layerCtx.shadowBlur = shadow;

          for (let row = 0; row < totalRows; row += 1) {
            const v = row / Math.max(1, totalRows - 1);
            const easedV = Math.pow(v, 1.35);
            const radius =
              outerRadius -
              bandThickness * easedV -
              layer * bandThickness * 0.032;
            const circumference = Math.PI * 2 * Math.max(radius, 1);
            const arcStep = circumference / strip.width * sliceWidth;
            const inwardNarrow = 1 - easedV * 0.78;
            const rowAlpha = 1 - easedV * 0.58;
            const sourceY = Math.min(strip.height - rowHeight, row * rowHeight);

            layerCtx.globalAlpha = alpha * rowAlpha;

            for (let sx = 0; sx < strip.width; sx += sliceWidth) {
              const sampleX = (sx + offsetX) % strip.width;
              const progress = sx / strip.width;
              const angle = progress * Math.PI * 2 - Math.PI * 0.5;
              const width = Math.max(2, arcStep * inwardNarrow);

              layerCtx.save();
              layerCtx.rotate(angle);
              layerCtx.drawImage(
                strip,
                sampleX,
                sourceY,
                sliceWidth,
                rowHeight,
                -width * 0.5,
                -radius,
                width,
                rowHeight * (1.35 - easedV * 0.48)
              );
              layerCtx.restore();
            }
          }

          layerCtx.restore();
          layers.push({
            canvas: layerCanvas,
            size,
            alpha,
            rotationOffset: layerDepth * 0.035,
            parallax: 8 - layer * 1.4,
          });
        }

        return layers;
      }

      function drawProjectedTunnel(options) {
        const {
          time,
          centerX,
          centerY,
          outerRadius,
          innerRadius,
          outerFontSize,
          rotation,
          condensed,
          depthLayers,
        } = options;

        if (state.projectedLayers.length === 0) {
          state.projectedLayers = buildProjectedTunnelLayers({
            outerRadius,
            innerRadius,
            outerFontSize,
            condensed,
            depthLayers,
          });
        }

        for (const layer of state.projectedLayers) {
          ctx.save();
          ctx.translate(centerX, centerY);
          ctx.rotate(rotation + layer.rotationOffset);
          ctx.globalAlpha = layer.alpha;
          ctx.drawImage(
            layer.canvas,
            -layer.size * 0.5 + state.mouse.x * layer.parallax,
            -layer.size * 0.5 + state.mouse.y * layer.parallax
          );
          ctx.restore();
        }

        ctx.globalAlpha = 1;
      }

      function drawBlackHole(time) {
        const { width, height, mouse } = state;
        const minSide = Math.min(width, height);
        const centerX = width * 0.5 + mouse.x * 22;
        const centerY = height * 0.5 + mouse.y * 16;
        const outerRadius = minSide * 0.43;
        const innerRadius = minSide * 0.19;
        const coreRadius = minSide * 0.154;

        drawProjectedTunnel({
          time,
          centerX,
          centerY,
          outerRadius,
          innerRadius,
          outerFontSize: minSide * 0.165,
          rotation: time * 0.06,
          condensed: 0.82,
          depthLayers: 4,
        });

        const halo = ctx.createRadialGradient(centerX, centerY, coreRadius * 0.7, centerX, centerY, coreRadius * 3.2);
        halo.addColorStop(0, "rgba(0, 0, 0, 0)");
        halo.addColorStop(0.22, "rgba(0, 0, 0, 0.82)");
        halo.addColorStop(0.36, "rgba(255, 255, 255, 0.06)");
        halo.addColorStop(0.52, "rgba(8, 11, 16, 0.92)");
        halo.addColorStop(1, "rgba(0, 0, 0, 0)");
        ctx.fillStyle = halo;
        ctx.beginPath();
        ctx.arc(centerX, centerY, coreRadius * 3.2, 0, Math.PI * 2);
        ctx.fill();

        ctx.save();
        ctx.translate(centerX, centerY);
        ctx.rotate(time * 0.12);
        ctx.strokeStyle = "rgba(255,255,255,0.12)";
        ctx.lineWidth = Math.max(1, minSide * 0.0038);
        ctx.shadowColor = "rgba(255,255,255,0.2)";
        ctx.shadowBlur = 20;

        for (let i = 0; i < 3; i += 1) {
          ctx.beginPath();
          ctx.ellipse(0, 0, coreRadius * (1.22 + i * 0.07), coreRadius * (1.02 + i * 0.04), 0, 0, Math.PI * 2);
          ctx.stroke();
        }

        ctx.restore();

        const shadow = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, coreRadius * 1.06);
        shadow.addColorStop(0, "#000000");
        shadow.addColorStop(0.78, "#000000");
        shadow.addColorStop(1, "rgba(0, 0, 0, 0)");
        ctx.fillStyle = shadow;
        ctx.beginPath();
        ctx.arc(centerX, centerY, coreRadius * 1.06, 0, Math.PI * 2);
        ctx.fill();

        ctx.beginPath();
        ctx.arc(centerX, centerY, coreRadius, 0, Math.PI * 2);
        ctx.fillStyle = "#000000";
        ctx.fill();

        const horizon = ctx.createRadialGradient(centerX, centerY, coreRadius * 0.9, centerX, centerY, coreRadius * 1.6);
        horizon.addColorStop(0, "rgba(255,255,255,0)");
        horizon.addColorStop(0.55, "rgba(255,255,255,0.03)");
        horizon.addColorStop(1, "rgba(255,255,255,0)");
        ctx.strokeStyle = horizon;
        ctx.lineWidth = minSide * 0.035;
        ctx.beginPath();
        ctx.arc(centerX, centerY, coreRadius * 1.15, 0, Math.PI * 2);
        ctx.stroke();
      }

      function animate(now) {
        const time = now * 0.001;

        state.mouse.x += (state.target.x - state.mouse.x) * 0.045;
        state.mouse.y += (state.target.y - state.mouse.y) * 0.045;

        ctx.setTransform(state.dpr, 0, 0, state.dpr, 0, 0);
        ctx.clearRect(0, 0, state.width, state.height);

        drawBackground(time);
        drawBlackHole(time);

        requestAnimationFrame(animate);
      }

      window.addEventListener("pointermove", (event) => {
        state.target.x = event.clientX / state.width - 0.5;
        state.target.y = event.clientY / state.height - 0.5;
      });

      window.addEventListener("pointerleave", () => {
        state.target.x = 0;
        state.target.y = 0;
      });

      window.addEventListener("resize", resize);

      resize();
      requestAnimationFrame(animate);
    </script>
  </body>
</html>
